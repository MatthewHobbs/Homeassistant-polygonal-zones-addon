name: Release addon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix, e.g. 0.2.12)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Resolve build matrix and version
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "Resolved version: $VERSION"
          # Sanity-check: must match the version in config.yaml so we don't
          # publish images that disagree with what the Supervisor expects.
          CONFIG_VERSION=$(awk -F'"' '/^version:/{print $2}' polygonal_zones_editor/config.yaml)
          if [ "$VERSION" != "$CONFIG_VERSION" ]; then
            echo "::error::tag/input version '$VERSION' does not match config.yaml version '$CONFIG_VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry exists
        # Run here, not in the downstream `release` job, so a missing entry
        # blocks the build before any image is pushed to ghcr.io. The same
        # awk extraction runs again in the `release` job to produce the
        # notes file.
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NOTES=$(awk -v v="## $VERSION" '
            $0 ~ "^"v" " || $0 == v {found=1; next}
            found && /^## / {exit}
            found {print}
          ' polygonal_zones_editor/CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION in polygonal_zones_editor/CHANGELOG.md"
            exit 1
          fi

      - name: Generate matrix
        id: gen
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, yaml
          with open("polygonal_zones_editor/build.yaml") as f:
              data = yaml.safe_load(f)
          arch_to_platform = {
              "aarch64": "linux/arm64",
              "amd64":   "linux/amd64",
              "armhf":   "linux/arm/v6",
              "armv7":   "linux/arm/v7",
              "i386":    "linux/386",
          }
          includes = [
              {"arch": arch, "platform": arch_to_platform[arch], "base": base}
              for arch, base in data["build_from"].items()
          ]
          missing = set(data["build_from"]) - set(arch_to_platform)
          if missing:
              raise SystemExit(f"build.yaml declares unknown arches: {sorted(missing)}")
          print("include=" + json.dumps(includes))
          PY

  tests:
    name: Tests
    # Re-run the unit tests for the tagged SHA. `push: tags` does not trigger
    # test.yml (it only fires on branch pushes and PRs), so without this gate
    # a tag could be pushed on a SHA that never had a green test run.
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  publish:
    name: Publish (${{ matrix.arch }})
    needs: [matrix, tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push polygonal_zones image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./polygonal_zones_editor
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-addon-polygonal_zones:${{ needs.matrix.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-addon-polygonal_zones:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [matrix, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.matrix.outputs.version }}"
          # Pick everything between "## VERSION" (with a literal space after to
          # avoid prefix collision like "0.2.1" matching "0.2.10") and the next "## " line.
          awk -v v="## $VERSION" '
            $0 ~ "^"v" " || $0 == v {found=1; next}
            found && /^## / {exit}
            found {print}
          ' polygonal_zones_editor/CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.matrix.outputs.version }}"
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md --title "$TAG"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi
