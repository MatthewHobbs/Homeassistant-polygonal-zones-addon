name: Release addon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix, e.g. 0.2.12)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to ghcr.io
  issues: write     # notify-failure job opens an issue on release failure

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Resolve build matrix and version
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "Resolved version: $VERSION"
          # Sanity-check: must match the version in config.yaml so we don't
          # publish images that disagree with what the Supervisor expects.
          CONFIG_VERSION=$(awk -F'"' '/^version:/{print $2}' polygonal_zones_editor/config.yaml)
          if [ "$VERSION" != "$CONFIG_VERSION" ]; then
            echo "::error::tag/input version '$VERSION' does not match config.yaml version '$CONFIG_VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry exists
        # Run here, not in the downstream `release` job, so a missing entry
        # blocks the build before any image is pushed to ghcr.io. The same
        # awk extraction runs again in the `release` job to produce the
        # notes file.
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NOTES=$(awk -v v="## $VERSION" '
            $0 ~ "^"v" " || $0 == v {found=1; next}
            found && /^## / {exit}
            found {print}
          ' polygonal_zones_editor/CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION in polygonal_zones_editor/CHANGELOG.md"
            exit 1
          fi

      - name: Generate matrix
        id: gen
        # Arch list comes from polygonal_zones_editor/build.yaml (the
        # HA-linter-approved file with plain tags). Digest-pinned base
        # refs come from .github/base-images.yaml. The two files must
        # agree on arch keys; we fail fast otherwise.
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, yaml
          with open("polygonal_zones_editor/build.yaml") as f:
              tags = yaml.safe_load(f)["build_from"]
          with open(".github/base-images.yaml") as f:
              refs = yaml.safe_load(f)["build_from"]
          if tags.keys() != refs.keys():
              raise SystemExit(
                  f"arch mismatch: build.yaml={sorted(tags)} "
                  f"vs base-images.yaml={sorted(refs)}"
              )
          arch_to_platform = {
              "aarch64": "linux/arm64",
              "amd64":   "linux/amd64",
          }
          missing = set(tags) - set(arch_to_platform)
          if missing:
              raise SystemExit(f"unknown arches: {sorted(missing)}")
          includes = [
              {"arch": arch, "platform": arch_to_platform[arch], "base": refs[arch]}
              for arch in tags
          ]
          print("include=" + json.dumps(includes))
          PY

  tests:
    name: Tests
    # Re-run the unit tests for the tagged SHA. `push: tags` does not trigger
    # test.yml (it only fires on branch pushes and PRs), so without this gate
    # a tag could be pushed on a SHA that never had a green test run.
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  lint:
    name: Lint
    # Re-run the addon linter for the tagged SHA. Same rationale as tests —
    # push: tags doesn't trigger lint.yml, so without this gate a tag could
    # be pushed on a SHA whose config.yaml is invalid against the HA addon
    # linter.
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read

  build:
    name: Build + smoke
    # Re-run the multi-arch docker build and the amd64 boot-smoke + Playwright
    # smoke for the tagged SHA. Without this gate, a release can publish an
    # image that has never been booted — exactly the class of regression that
    # bit 0.2.16–0.2.22 (AppArmor profile broke container boot; unit tests
    # and the HA addon linter passed, so the release gate was green).
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  publish:
    name: Publish (${{ matrix.arch }})
    needs: [matrix, tests, lint, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push polygonal_zones image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./polygonal_zones_editor
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          push: true
          # Supervisor resolves the addon image tag from config.yaml's
          # `version:` field, not from `:latest`. Pushing :latest only
          # creates a partial-release hazard (a mid-matrix failure leaves
          # :latest pointing at mixed versions across arches). Removed.
          # See docs/RUNBOOK.md for the release-recovery procedure.
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-addon-polygonal_zones:${{ needs.matrix.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Notarize the pushed image with Codenotary CAS. Runs only when the
      # CAS_API_KEY secret is configured on the repo — makes the whole
      # signing pipeline opt-in per the #65 enablement procedure.
      #
      # Enablement:
      #   1. Create a CAS identity at https://cas.codenotary.com (free for
      #      community use).
      #   2. Settings → Secrets and variables → Actions → new secret
      #      CAS_API_KEY with the value from CAS.
      #   3. Cut a release tag. This step signs each arch's image.
      #   4. Once signing has succeeded on at least one release, uncomment
      #      the `codenotary:` key in polygonal_zones_editor/config.yaml
      #      so the Supervisor verifies the attestation on install/update.
      #
      # Keep the secret unset to skip signing — existing release flow works
      # unchanged.
      - name: Notarize image with codenotary/cas
        env:
          CAS_API_KEY: ${{ secrets.CAS_API_KEY }}
        if: env.CAS_API_KEY != ''
        run: |
          set -euo pipefail
          CAS_VERSION=1.0.4
          curl -sSfL \
            "https://github.com/codenotary/cas/releases/download/v${CAS_VERSION}/cas-v${CAS_VERSION}-linux-amd64" \
            -o /tmp/cas
          chmod +x /tmp/cas
          /tmp/cas login --api-key "$CAS_API_KEY"
          IMG="ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-addon-polygonal_zones:${{ needs.matrix.outputs.version }}"
          /tmp/cas notarize --hash "docker://${IMG}"

  release:
    name: Create GitHub Release
    needs: [matrix, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.matrix.outputs.version }}"
          # Pick everything between "## VERSION" (with a literal space after to
          # avoid prefix collision like "0.2.1" matching "0.2.10") and the next "## " line.
          awk -v v="## $VERSION" '
            $0 ~ "^"v" " || $0 == v {found=1; next}
            found && /^## / {exit}
            found {print}
          ' polygonal_zones_editor/CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.matrix.outputs.version }}"
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md --title "$TAG"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi

  notify-failure:
    # Fires when any upstream release job fails. Opens a GitHub issue so a
    # partial release (some arches pushed, others failed) doesn't go silent
    # and drift into "users on different versions depending on arch".
    name: Notify on failure
    if: failure()
    needs: [matrix, tests, lint, build, publish, release]
    runs-on: ubuntu-latest
    steps:
      - name: Open an issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERSION: ${{ needs.matrix.outputs.version }}
        run: |
          # matrix may not have run (e.g. lint failed first) so fall back to
          # the ref-derived tag name rather than failing the notify step too.
          TAG="${VERSION:-${GITHUB_REF#refs/tags/v}}"
          gh issue create \
            --title "Release v${TAG} failed" \
            --body "The release workflow failed for v${TAG}. See the run: ${RUN_URL}. Check which jobs failed; a partial publish may have pushed some arches but not others. Recover by re-running the failed jobs after fixing the cause." \
            --label bug
