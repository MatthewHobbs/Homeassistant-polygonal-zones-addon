name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            polygonal_zones_editor/requirements.txt
            polygonal_zones_editor/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r polygonal_zones_editor/requirements.txt
          pip install -r polygonal_zones_editor/requirements-dev.txt
      - name: Run pytest
        working-directory: polygonal_zones_editor
        run: pytest -v
