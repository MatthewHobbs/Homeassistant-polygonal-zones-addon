name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            polygonal_zones_editor/requirements.txt
            polygonal_zones_editor/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r polygonal_zones_editor/requirements.txt
          pip install -r polygonal_zones_editor/requirements-dev.txt
      - name: Run pytest
        working-directory: polygonal_zones_editor
        run: pytest -v
