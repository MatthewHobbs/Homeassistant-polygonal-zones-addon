name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Release workflow calls this as a prerequisite gate, so a tag push never
  # publishes an image without the unit tests passing on the same SHA.
  workflow_call:

permissions:
  contents: read

concurrency:
  # Prefix with "tests-" so this doesn't share a group with lint.yml when
  # both are called from release.yml. Reusable workflows inherit the
  # caller's `github.workflow` and `github.ref`, so a plain
  # "${{ github.workflow }}-${{ github.ref }}" group collides with lint's
  # and cancels whichever runs second.
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            polygonal_zones_editor/requirements.txt
            polygonal_zones_editor/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r polygonal_zones_editor/requirements.txt
          pip install -r polygonal_zones_editor/requirements-dev.txt
      - name: Run pytest
        working-directory: polygonal_zones_editor
        run: pytest -v
