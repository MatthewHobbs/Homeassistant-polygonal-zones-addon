name: Lint addon

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint polygonal_zones_editor
        uses: frenck/action-addon-linter@v2
        with:
          path: "./polygonal_zones_editor"
