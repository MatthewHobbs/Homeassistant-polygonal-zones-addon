name: Lint addon

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Release workflow calls this as a prerequisite gate, so a tag push never
  # publishes an image with a broken config.yaml or addon-linter violation
  # on the tagged SHA.
  workflow_call:

permissions:
  contents: read

concurrency:
  # Prefix with "lint-" so this doesn't share a group with test.yml when
  # both are called from release.yml. Reusable workflows inherit the
  # caller's `github.workflow` and `github.ref`, so a plain
  # "${{ github.workflow }}-${{ github.ref }}" group collides with tests'
  # and cancels whichever runs second.
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint polygonal_zones_editor
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: "./polygonal_zones_editor"
