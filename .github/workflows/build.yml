name: Build addon

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build polygonal_zones_editor image
        uses: docker/build-push-action@v6
        with:
          context: ./polygonal_zones_editor
          push: false
          load: false
