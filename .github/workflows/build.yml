name: Build addon

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Release workflow calls this as a prerequisite gate, so a tag push never
  # publishes an image that hasn't been boot-smoked. Closes the regression
  # hole that bit 0.2.16–0.2.22 (AppArmor profile broke container boot; CI
  # passed because test.yml + lint.yml don't exercise the image).
  workflow_call:

permissions:
  contents: read

concurrency:
  # Prefix with "build-" so this doesn't share a group with test.yml /
  # lint.yml when all three are called from release.yml. Reusable workflows
  # inherit the caller's `github.workflow` and `github.ref`, so a plain
  # "${{ github.workflow }}-${{ github.ref }}" group collides with the
  # others and cancels whichever runs second.
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: Resolve build matrix from build.yaml
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Generate matrix
        id: gen
        # Arch list comes from polygonal_zones_editor/build.yaml (the
        # HA-linter-approved file with plain tags). Digest-pinned base
        # refs come from .github/base-images.yaml. The two files must
        # agree on arch keys; we fail fast otherwise.
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, yaml
          with open("polygonal_zones_editor/build.yaml") as f:
              tags = yaml.safe_load(f)["build_from"]
          with open(".github/base-images.yaml") as f:
              refs = yaml.safe_load(f)["build_from"]
          if tags.keys() != refs.keys():
              raise SystemExit(
                  f"arch mismatch: build.yaml={sorted(tags)} "
                  f"vs base-images.yaml={sorted(refs)}"
              )
          arch_to_platform = {
              "aarch64": "linux/arm64",
              "amd64":   "linux/amd64",
          }
          missing = set(tags) - set(arch_to_platform)
          if missing:
              raise SystemExit(f"unknown arches: {sorted(missing)}")
          includes = [
              {"arch": arch, "platform": arch_to_platform[arch], "base": refs[arch]}
              for arch in tags
          ]
          print("include=" + json.dumps(includes))
          PY

  docker-build:
    name: Build (${{ matrix.arch }})
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build polygonal_zones_editor image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./polygonal_zones_editor
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke-test the amd64 image only — it can be loaded into the runner's
      # docker daemon without QEMU. Verifies the addon actually boots under a
      # Supervisor-style /data mount (root-owned options.json), which would
      # have caught the regressions in 0.2.0 and 0.2.1.
      - name: Build amd64 smoke image
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./polygonal_zones_editor
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          load: true
          tags: polygonal-zones:smoke
          cache-from: type=gha

      - name: Boot container and probe endpoints
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          DATA=$(mktemp -d)
          # Simulate the Supervisor mount: options.json is root-owned. The
          # addon must still be able to read it.
          sudo install -o root -g root -m 0644 /dev/stdin "$DATA/options.json" <<< '{"allow_all_ips":true,"zone_colour":"green"}'

          docker run -d --name smoke -p 8000:8000 -v "$DATA":/data polygonal-zones:smoke

          # Wait up to 30s for /healthz.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz | grep -q ok; then
              echo "OK /healthz responded on attempt $i"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "FAIL /healthz never responded"
              docker logs smoke
              exit 1
            fi
            sleep 1
          done

          # /zones.json must return a valid empty FeatureCollection (seeded at
          # startup if /data/polygonal_zones/zones.json is absent).
          curl -fsS http://127.0.0.1:8000/zones.json | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get("type")=="FeatureCollection" and isinstance(d.get("features"), list), d; print("OK /zones.json shape")'

          # /save_zones round-trip with a mix of Polygon and MultiPolygon
          # features. The MultiPolygon exercises the frontend's shape-count
          # indicator and the save path's toGeoJSON-based export (the
          # previous hand-rolled export destroyed MultiPolygon rings).
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data '{"type":"FeatureCollection","features":[
              {"type":"Feature","properties":{"name":"smoke"},
               "geometry":{"type":"Polygon","coordinates":[[[0,0],[1,0],[1,1],[0,0]]]}},
              {"type":"Feature","properties":{"name":"multi"},
               "geometry":{"type":"MultiPolygon","coordinates":[
                 [[[2,2],[3,2],[3,3],[2,2]]],
                 [[[4,4],[5,4],[5,5],[4,4]]]
               ]}}
            ]}' \
            http://127.0.0.1:8000/save_zones | grep -q '"status":"ok"' && echo "OK /save_zones round-trip"

          # The web service must run as non-root (uid != 0). Regression guard
          # for #14. BusyBox ps doesn't support -p, so read /proc directly.
          PID=$(docker exec smoke pgrep -f 'python main.py' | head -n1 || true)
          if [ -z "$PID" ]; then
            echo "FAIL could not locate python main.py process"
            docker exec smoke ps || true
            docker logs smoke
            exit 1
          fi
          WEB_UID=$(docker exec smoke awk '/^Uid:/{print $2}' "/proc/$PID/status")
          if [ "$WEB_UID" = "0" ]; then
            echo "FAIL web service is running as root (uid 0)"
            docker logs smoke
            exit 1
          fi
          echo "OK web service runs as uid $WEB_UID (non-root)"

      # Headless-browser smoke: load index.html, ensure no JS errors and that
      # the zone we POSTed above actually renders. Catches client-side
      # regressions that endpoint-only probing misses (e.g. the 0.2.6 ->
      # 0.2.8 module-scope bug where /zones.json returned 200 but the page
      # showed "Failed to load zones" because of a JS ReferenceError).
      - name: Frontend smoke (Playwright)
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium >/dev/null

          python3 - <<'PY'
          import asyncio, sys
          from playwright.async_api import async_playwright

          async def main():
              errors = []
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  page.on("pageerror", lambda e: errors.append(f"pageerror: {e}"))
                  page.on("console", lambda m: m.type == "error" and errors.append(f"console.error: {m.text}"))
                  await page.goto("http://127.0.0.1:8000/", wait_until="networkidle")

                  body = (await page.locator("body").text_content()) or ""
                  if "Failed to load zones" in body:
                      print("FAIL page shows 'Failed to load zones'")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # The smoke step POSTed a Polygon ("smoke") and a
                  # MultiPolygon with two shapes ("multi"). Both must
                  # render as <zone-entry> elements.
                  count = await page.locator("zone-entry").count()
                  if count < 2:
                      print(f"FAIL expected 2 zone-entry elements, got {count}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # The MultiPolygon zone must surface a shape count in its
                  # shadow DOM — regression guard for the save-round-trip
                  # fix that preserves MultiPolygon geometry.
                  shape_count_text = await page.evaluate(
                      "() => Array.from(document.querySelectorAll('zone-entry'))"
                      ".map(z => z.shadowRoot.querySelector('.shape-count').textContent)"
                      ".filter(t => t.trim()).join('|')"
                  )
                  if "2 shapes" not in shape_count_text:
                      print(f"FAIL expected '(2 shapes)' indicator on the MultiPolygon zone; got: {shape_count_text!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # A11y regression guard (#116). The leaflet-draw toolbar
                  # anchors are patched post-addControl to mirror their
                  # title= into aria-label (WCAG 2.2 SC 4.1.2). The
                  # zone-entry rename input lives inside shadow DOM where
                  # <label for=…> never associates per spec, so it uses
                  # aria-label directly.
                  draw_aria = await page.evaluate(
                      "() => document.querySelector('.leaflet-draw-draw-polygon')?.getAttribute('aria-label')"
                  )
                  if not draw_aria:
                      print(f"FAIL leaflet-draw polygon control missing aria-label; got: {draw_aria!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  input_aria = await page.evaluate(
                      "() => document.querySelector('zone-entry[editing=\"true\"], zone-entry')"
                      "?.shadowRoot?.querySelector('input[type=text]')?.getAttribute('aria-label')"
                  )
                  # Zone-entry only renders the input when editing, so trigger
                  # edit mode on the first entry before asserting.
                  await page.evaluate(
                      "() => document.querySelector('zone-entry')"
                      "?.shadowRoot?.querySelector('.edit-btn')?.click()"
                  )
                  input_aria = await page.evaluate(
                      "() => document.querySelector('zone-entry')"
                      "?.shadowRoot?.querySelector('input[type=text]')?.getAttribute('aria-label')"
                  )
                  if not input_aria:
                      print(f"FAIL zone-entry rename input missing aria-label; got: {input_aria!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # Tile-picker regression guard (#31, 0.2.28). Asserts the
                  # <select> exists, carries the expected four options in
                  # order (auto + three basemaps), defaults to 'auto' on
                  # a fresh load, and that switching to satellite actually
                  # swaps the active Leaflet tile layer to arcgisonline.
                  picker_options = await page.evaluate(
                      "() => Array.from(document.querySelectorAll('#pz-basemap-select option')).map(o => o.value)"
                  )
                  expected_options = ["auto", "osm", "carto-dark", "esri-imagery"]
                  if picker_options != expected_options:
                      print(f"FAIL picker options {picker_options!r} != {expected_options!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  picker_initial = await page.evaluate(
                      "() => document.getElementById('pz-basemap-select').value"
                  )
                  if picker_initial != "auto":
                      print(f"FAIL picker default value {picker_initial!r} != 'auto' on fresh load")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  await page.select_option("#pz-basemap-select", "esri-imagery")
                  await page.wait_for_timeout(150)
                  active_url = await page.evaluate(
                      """() => {
                          let url = null;
                          map.eachLayer(l => { if (l instanceof L.TileLayer) url = l._url; });
                          return url;
                      }"""
                  )
                  if not active_url or "arcgisonline.com" not in active_url:
                      print(f"FAIL active tile URL after switch to satellite doesn't mention arcgisonline: {active_url!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # Reset to 'auto' so the subsequent draw→save round-trip
                  # runs on the default OSM layer (no stale satellite state).
                  await page.select_option("#pz-basemap-select", "auto")
                  await page.wait_for_timeout(150)

                  # Draw→save round-trip regression guard. Earlier versions
                  # of the draw:created handler set `layer.feature` without
                  # `type: "Feature"`; Leaflet's toGeoJSON then emitted a
                  # feature missing the type field, which the server-side
                  # validator rejected with 422. No test covered the full
                  # draw→save path (the smoke above POSTs a pre-made
                  # payload). This assertion closes the gap.
                  save_status = await page.evaluate(
                      """async () => {
                          const layer = L.polygon([[50, 10], [50, 11], [51, 10]]);
                          map.fire('draw:created', {layerType: 'polygon', layer});
                          const headers = {'Content-Type': 'application/json'};
                          const features = [];
                          editableLayers.eachLayer(l => {
                              const f = l.toGeoJSON();
                              f.properties = {name: l.feature.properties.name};
                              features.push(f);
                          });
                          const r = await fetch('./save_zones', {
                              method: 'POST',
                              headers: headers,
                              body: JSON.stringify({type: 'FeatureCollection', features}),
                          });
                          return r.status;
                      }"""
                  )
                  if save_status != 200:
                      print(f"FAIL draw→save round-trip returned {save_status} (expected 200)")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # #130 viewport-persistence regression guard (0.2.31).
                  # Programmatically pan to LA, wait past the 500ms debounce,
                  # reload, assert the persisted center/zoom is honoured.
                  await page.evaluate("() => map.setView([34.0522, -118.2437], 11)")
                  await page.wait_for_timeout(800)
                  stored_viewport = await page.evaluate(
                      "() => window.PZStorage.get('pz:viewport')"
                  )
                  if not stored_viewport or "34.0522" not in stored_viewport:
                      print(f"FAIL pz:viewport not written after setView: {stored_viewport!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)
                  await page.reload(wait_until="domcontentloaded")
                  await page.wait_for_selector("zone-entry", timeout=5000)
                  post_reload_center = await page.evaluate(
                      "() => ({lat: map.getCenter().lat, lng: map.getCenter().lng})"
                  )
                  if abs(post_reload_center["lat"] - 34.0522) > 0.01:
                      print(f"FAIL viewport not restored across reload: {post_reload_center!r}")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  # #123 save-error-persistence regression guard (0.2.31).
                  # Intercept /save_zones, force a 500, trigger a save,
                  # wait past the old 2s auto-clear, assert the error is
                  # still visible. Kept at the very end of the smoke
                  # because page.route applies to subsequent requests only
                  # and doesn't need to be unrouted before browser.close.
                  # The expected 500 fires a console.error "Failed to load
                  # resource" which would otherwise trip the final errors
                  # aggregator — clear the list first so only post-#123
                  # unexpected errors would fail the check.
                  errors.clear()
                  async def fail_save(route, request):
                      if request.url.endswith("/save_zones") and request.method == "POST":
                          await route.fulfill(status=500, body="boom")
                      else:
                          await route.continue_()
                  await page.route("**/*", fail_save)
                  await page.evaluate("() => save_zones()")
                  await page.wait_for_function(
                      "() => document.querySelector('.save-btn').classList.contains('error')",
                      timeout=5000,
                  )
                  await page.wait_for_timeout(2500)
                  still_error = await page.evaluate(
                      "() => document.querySelector('.save-btn').classList.contains('error') && "
                      "!!document.getElementById('save-status')?.textContent"
                  )
                  if not still_error:
                      print("FAIL save error cleared within 2.5s (regression of #123)")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  if errors:
                      print("FAIL JS errors during page load:")
                      for e in errors: print(" -", e)
                      sys.exit(1)

                  print(f"OK page loaded clean, {count} zone-entry rendered, shape-count ok")
                  await browser.close()

          asyncio.run(main())
          PY

      - name: Container logs and cleanup
        if: matrix.arch == 'amd64' && always()
        run: |
          echo "--- container logs ---"
          docker logs smoke || true
          docker stop smoke >/dev/null 2>&1 || true
