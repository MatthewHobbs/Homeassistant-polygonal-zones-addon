[pytest]
pythonpath = app
testpaths = tests
# Measure coverage on the app package. Gate at 100% — any uncovered
# line fails CI and blocks the PR. Pair new code with tests covering
# it, or add `# pragma: no cover` for the rare path that's genuinely
# not testable in pytest (e.g. the `if __name__ == "__main__":` block
# exercised by build.yml's smoke boot instead).
# show_missing prints any gap's line numbers so a regression is
# immediately actionable.
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=100
