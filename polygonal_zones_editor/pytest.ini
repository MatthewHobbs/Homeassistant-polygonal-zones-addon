[pytest]
pythonpath = app
testpaths = tests
# Measure coverage on the app package. Gate at 98% — we're currently
# at 100% so that leaves ~5 lines of headroom before CI fails. Tight
# enough that a meaningful regression trips the gate; loose enough
# that adding a single defensive branch doesn't block a PR.
# show_missing prints any gap's line numbers so a regression is
# immediately actionable.
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=98
