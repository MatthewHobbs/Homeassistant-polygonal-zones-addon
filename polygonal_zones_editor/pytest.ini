[pytest]
pythonpath = app
testpaths = tests
# Measure coverage on the app package; fail the suite if any line is
# uncovered. `show_missing` prints the gap's line numbers in the
# terminal when coverage drops, so CI failures are actionable.
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=100
