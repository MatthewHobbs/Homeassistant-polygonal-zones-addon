name: "Polygonal Zones"
description: "Helper Add-on for the polygonal zones integration."
version: "0.2.15"
slug: "polygonal_zones"
url: "https://github.com/MatthewHobbs/Homeassistant-polygonal-zones-addon/tree/main/polygonal_zones_editor"
panel_icon: "mdi:map"
# Pre-built images published by .github/workflows/release.yml on each
# v* tag. Supervisor pulls instead of building locally — much faster
# updates on slow ARM hardware.
image: "ghcr.io/matthewhobbs/{arch}-addon-polygonal_zones"

init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
# The addon only serves data that the polygonal-zones integration polls from
# Home Assistant Core, so it belongs in the `services` tier rather than
# `system`. `system` is for DNS / Supervisor-level services that must come up
# before Core.
startup: services
ingress: true
ingress_port: 8000
ports:
  8000/tcp: 8000

options:
  allow_all_ips: false
  zone_colour: purple
  trusted_proxies: ""
  log_level: info
  save_token: ""
  theme: auto
schema:
  allow_all_ips: bool
  zone_colour: str
  trusted_proxies: str?
  log_level: list(debug|info|warning|error|critical)?
  save_token: password?
  theme: list(auto|light|dark)?
