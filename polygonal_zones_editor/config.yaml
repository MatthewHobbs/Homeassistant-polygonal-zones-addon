name: "Polygonal Zones"
description: "Helper Add-on for the polygonal zones integration."
version: "0.2.19"
slug: "polygonal_zones"
url: "https://github.com/MatthewHobbs/Homeassistant-polygonal-zones-addon/tree/main/polygonal_zones_editor"
# Uncomment when the codenotary/cas signing pipeline has been enabled
# (see the `Notarize image with codenotary/cas` step in
# .github/workflows/release.yml for the enablement procedure). Setting
# this key tells the Supervisor to verify the image attestation at
# install/update time; without a corresponding signature, installs
# fail. Enable in lock-step with shipping the first signed release —
# do NOT ship this uncommented until the CAS_API_KEY secret exists
# and a tagged release has successfully notarized.
# codenotary: matt@matthobbs.net
panel_icon: "mdi:map"
# Pre-built images published by .github/workflows/release.yml on each
# v* tag. Supervisor pulls instead of building locally — much faster
# updates on slow ARM hardware.
image: "ghcr.io/matthewhobbs/{arch}-addon-polygonal_zones"

init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
# The addon only serves data that the polygonal-zones integration polls from
# Home Assistant Core, so it belongs in the `services` tier rather than
# `system`. `system` is for DNS / Supervisor-level services that must come up
# before Core.
startup: services
ingress: true
ingress_port: 8000
# TCP 8000 is declared but unmapped by default. Users who want direct LAN
# access (e.g. for `curl`-based backups or running the companion integration
# in a separate container) opt in via Supervisor -> Network -> set a host
# port. Default ingress-only is the safer posture; pair with save_token
# whenever the port is exposed.
ports:
  8000/tcp: null

options:
  allow_all_ips: false
  zone_colour: purple
  trusted_proxies: ""
  log_level: info
  save_token: ""
  theme: auto
schema:
  allow_all_ips: bool
  # Accept CSS colour names (letters only) or hex values of 3/4/6/8 hex
  # digits. Tightening this prevents Supervisor from accepting empty
  # strings or rgb()/hsl() function notation that neither the backend nor
  # Leaflet is equipped to handle.
  zone_colour: match(^#[0-9a-fA-F]{3,8}$|^[a-zA-Z]+$)
  trusted_proxies: str?
  log_level: list(debug|info|warning|error|critical)?
  save_token: password?
  theme: list(auto|light|dark)?
